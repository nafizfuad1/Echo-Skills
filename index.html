<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Echo-Skill</title>
    <!-- linking CSS  -->
    <link rel="stylesheet" href="style.css" />
    <!-- linking google font  -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Karla:ital,wght@0,200..800;1,200..800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Home page starts here  -->
    <section >
      <div class="home-bg">
        <div class="container home-body">
          <div class="home-left">
        <div class="logo">
          <img src="./img/logo.png" alt="logoImg" class="logoImg" />
        </div>
        <div class="left-section-content">
          <h2 class="hero-title">Hello and welcome.</h2>
          <p class="hero-text">
            Before we begin, please select a type of development.
          </p>
          <div class="hero-buttons">
            <button data-type="frontend" class="hero-button">
              Front-end development
            </button>
            <button data-type="backend" class="hero-button">
              Back-end development
            </button>
            <button data-type="fullstack" class="hero-button">
              Full stack development
            </button>
          </div>
        </div>
      </div>
      <div class="home-right">
        <div class="hero-img">
          <img src="./img/hero.png" alt="hero-image" class="main-hero-image" />
        </div>
      </div>
        </div>
      </div>
    </section>
    <!-- Home page ends here  -->

    <!-- Sliders section starts here  -->
    <section id="slider" class="hidden">
      <div class="slider-container">
        <div class="slider-left">
          <img id="slideImage" src="" alt="" />
        </div>

        <div class="slider-right">
          <div class="progress-bar">
            <div id="progress"></div>
          </div>

          <h2 id="slider-title"></h2>
          <p id="description"></p>
          <h3 id="question"></h3>

          <div class="slider-buttons">
            <button id="yesBtn">Yes</button>
            <button id="noBtn">No</button>
          </div>

          <div class="arrows">
            <button id="prev">⬅</button>
            <button id="next">➡</button>
          </div>
        </div>
      </div>
    </section>
    <!-- Sliders section starts here  -->

    <!-- Footer starts here  -->
    <footer>
      <p class="footer-text">Copyright © 2022 ECHOLOGYX. All rights reserved</p>
    </footer>
    <!-- Footer ends here  -->
    <script src="./script.js"></script>
  </body>
</html>
